name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint/build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint -w chatapp-backend -- --max-warnings=0

      - name: Build
        run: npm run build -w chatapp-backend

      - name: Check schema drift (init.sql vs migrations)
        run: npm run check:schema-drift -w chatapp-backend

      - name: Check secrets are not committed
        run: npm run check:secrets -w chatapp-backend

      - name: Validate production env rules
        shell: bash
        run: |
          export NODE_ENV=production
          export DATABASE_URL=postgresql://chatapp:ci-strong-db-password-32chars@localhost:5432/chatapp
          export REDIS_URL=redis://localhost:6379
          export JWT_ACCESS_SECRET=$(node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")
          export JWT_REFRESH_SECRET=$(node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")
          export CORS_ORIGIN=https://app.example.com
          export LOG_LEVEL=info
          export S3_ENDPOINT=s3.example.com
          export S3_ACCESS_KEY=$(node -e "console.log(require('crypto').randomBytes(16).toString('hex'))")
          export S3_SECRET_KEY=$(node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")
          export S3_REGION=us-east-1
          export S3_BUCKET_AVATARS=avatars
          export S3_BUCKET_ATTACHMENTS=attachments
          export S3_BUCKET_DOCUMENTS=documents
          export S3_BUCKET_VIDEOS=videos
          export S3_BUCKET_VOICE=voice
          npm run validate:env -w chatapp-backend

  desktop:
    name: Desktop (typecheck/build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint -w chatapp-desktop -- --max-warnings=0

      - name: Build
        run: npm run build -w chatapp-desktop

  admin:
    name: Admin (lint/build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint -w chatapp-admin -- --max-warnings=0

      - name: Build
        run: npm run build -w chatapp-admin

  docker:
    name: Docker build (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: chatapp-backend:ci
